      <animate attributeName="height" to="135" begin="2.5s" dur="0.7s" fill="freeze"/>
    </rect>
    <rect x="160" y="310" width="16" height="0" fill="#00FF00" fill-opacity="0.65">
      <animate attributeName="y" to="169" begin="2.6s" dur="0.8s" fill="freeze"/>
      <animate attributeName="height" to="141" begin="2.6s" dur="0.8s" fill="freeze"/>
    </rect>
    <rect x="180" y="310" width="16" height="0" fill="#00FF00" fill-opacity="0.7">
      <animate attributeName="y" to="145" begin="2.7s" dur="0.8s" fill="freeze"/>
      <animate attributeName="height" to="165" begin="2.7s" dur="0.8s" fill="freeze"/>
    </rect>
    <rect x="200" y="310" width="16" height="0" fill="#00FF00" fill-opacity="0.75">
      <animate attributeName="y" to="139" begin="2.8s" dur="0.9s" fill="freeze"/>
      <animate attributeName="height" to="171" begin="2.8s" dur="0.9s" fill="freeze"/>
    </rect>

    <text x="116" y="198" font-size="10" fill="#00FF00" text-anchor="end" filter="url(#glow)" opacity="0">
      <animate attributeName="opacity" to="0.95" begin="3.4s" dur="0.5s" fill="freeze"/>
      0.0274
    </text>

    <g font-size="8.5" text-anchor="middle">
      <text x="28"  y="326" fill="#666666">Fib</text>
      <text x="48"  y="326" fill="#888888">Clu</text>
      <text x="68"  y="326" fill="#888888">Hex</text>
      <text x="88"  y="326" fill="#888888">Con</text>
      <text x="108" y="326" fill="#888888">Frac</text>
      <text x="128" y="326" fill="#00FF00" font-weight="bold">Bot</text>
      <text x="148" y="326" fill="#888888">DLA</text>
      <text x="168" y="326" fill="#888888">Rand</text>
      <text x="188" y="326" fill="#888888">Ret</text>
      <text x="208" y="326" fill="#888888">Vor</text>
    </g>
    
    <text x="112.5" y="360" font-size="11" fill="#00FF41" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" to="0.9" begin="3.6s" dur="0.5s" fill="freeze"/>
      below stochastic, above regular
    </text>
  </g>

  <g transform="translate(580, 40)" font-family="Courier New, monospace" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.5s" begin="3s" fill="freeze"/>

    <circle cx="-20" cy="9" r="4" fill="#00FF00" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.375;1" dur="4s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="-20" cy="9" fill="none" stroke="#00FF00" filter="url(#glow)">
      <animate attributeName="r" values="0;40;0;0" keyTimes="0;0.375;0.376;1" dur="4s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0.4;0;0;0" keyTimes="0;0.375;0.376;1" dur="4s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="stroke-width" values="0.4;0.05;0;0" keyTimes="0;0.375;0.376;1" dur="4s" repeatCount="indefinite" begin="3s"/>
    </circle>
    
    <text x="0" y="14" font-size="14" fill="#00FF00" font-weight="bold" letter-spacing="1.5">03 / SIGNIFICANCE</text>
    <line x1="0" y1="26" x2="225" y2="26" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>
    
    <text x="0" y="46" font-size="12" fill="#888888">Holm–Bonferroni</text>
    <text x="0" y="60" font-size="12" fill="#888888">10 morphologies</text>

    <text x="0" y="140" font-size="34" font-weight="bold" fill="#00FF00">12 / 21</text>
    <text x="0" y="162" font-size="13" fill="#FFFFFF" fill-opacity="0.85">significant · Merit &amp; Peak AF</text>

    <text x="0" y="235" font-size="20" font-weight="bold" fill="#FFFFFF" fill-opacity="0.7">24 / 45</text>
    <text x="0" y="255" font-size="12" fill="#888888">comparisons n/a</text>
    <text x="0" y="271" font-size="11" fill="#888888">(fractal, Fibonacci, hexagonal)</text>

    <text x="0" y="360" font-size="11" fill="#00FF41">4 botanical hits · Merit &amp; Peak AF</text>
  </g>

  <g transform="translate(845, 40)" font-family="Courier New, monospace" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <circle cx="-20" cy="9" r="4" fill="#00FF00" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.375;1" dur="4s" repeatCount="indefinite" begin="4.5s"/>
    </circle>
    <circle cx="-20" cy="9" fill="none" stroke="#00FF00" filter="url(#glow)">
      <animate attributeName="r" values="0;40;0;0" keyTimes="0;0.375;0.376;1" dur="4s" repeatCount="indefinite" begin="4.5s"/>
      <animate attributeName="opacity" values="0.4;0;0;0" keyTimes="0;0.375;0.376;1" dur="4s" repeatCount="indefinite" begin="4.5s"/>
      <animate attributeName="stroke-width" values="0.4;0.05;0;0" keyTimes="0;0.375;0.376;1" dur="4s" repeatCount="indefinite" begin="4.5s"/>
    </circle>
    
    <text x="0" y="14" fill="#00FF00" font-weight="bold" letter-spacing="1.5" font-size="14">04 / INFERENCE</text>
    <line x1="0" y1="26" x2="225" y2="26" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="8" to="0" dur="3s" repeatCount="indefinite"/>
    </line>

    <text x="0" y="42" font-size="11" fill="#888888">N=30 seeds</text>
    <text x="0" y="56" font-size="11" fill="#888888">21 valid comparisons</text>

    <text x="0" y="78" font-size="11" font-weight="bold" fill="#FFFFFF" letter-spacing="1">MERIT SCALED</text>
    
    <text x="0" y="94" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &lt; Voronoi</text>
    <text x="0" y="108" font-size="11" fill="#00FF41">d = −1.05 · power = 0.99</text>
    
    <text x="0" y="122" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &lt; reticulate</text>
    <text x="0" y="136" font-size="11" fill="#00FF41">d = −1.04 · power = 0.98</text>
    
    <text x="0" y="150" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &gt; clusters</text>
    <text x="0" y="164" font-size="11" fill="#00FF41">d = +1.64 · power = 1.00</text>
    
    <text x="0" y="178" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &gt; concentric</text>
    <text x="0" y="192" font-size="11" fill="#00FF41">d = +1.52 · power = 1.00</text>
    
    <line x1="0" y1="202" x2="225" y2="202" stroke="#333333" stroke-width="0.5"/>

    <text x="0" y="216" font-size="11" font-weight="bold" fill="#FFFFFF" letter-spacing="1">PEAK AF</text>
    
    <text x="0" y="232" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &lt; Voronoi</text>
    <text x="0" y="246" font-size="11" fill="#00FF41">d = −1.19 · power = 1.00</text>
    
    <text x="0" y="260" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &lt; reticulate</text>
    <text x="0" y="274" font-size="11" fill="#00FF41">d = −1.22 · power = 1.00</text>
    
    <text x="0" y="288" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &gt; clusters</text>
    <text x="0" y="302" font-size="11" fill="#00FF41">d = +1.66 · power = 1.00</text>
    
    <text x="0" y="316" font-size="12" fill="#FFFFFF" fill-opacity="0.9">Bot &gt; concentric</text>
    <text x="0" y="330" font-size="11" fill="#00FF41">d = +1.57 · power = 1.00</text>

    <line x1="0" y1="337" x2="225" y2="337" stroke="#333333" stroke-width="0.5"/>

    <text x="0" y="344" font-size="10" fill="#555555">topology H1/H2/H3:</text>
    <text x="0" y="352" font-size="10" fill="#555555">no |r| ≥ 0.632 (N=10)</text>
    <text x="0" y="360" font-size="10" fill="#555555">robustness 125/125 · bot vs rand</text>
  </g>
