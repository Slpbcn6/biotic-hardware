        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="5.0s" fill="freeze"/>
      </rect>
    </g>

    <line x1="0" y1="190" x2="190" y2="190" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="0.5"/>

    <text x="0" y="210" font-size="14" fill="#FFFFFF" fill-opacity="0.9">Botanical ≠ Fractal</text>
    <text x="0" y="224" font-size="11" fill="#888888">p=0.002  |d|=0.843  (large)</text>

    <text x="0" y="251" font-size="14" fill="#FF8888">Fractal ≈ Random</text>
    <text x="0" y="265" font-size="11" fill="#888888">p=0.938  |d|=0.020  (n.s.)</text>
  </g>

  <g transform="translate(825, 30)" font-family="Courier New, monospace" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <circle cx="-20" cy="9" r="4" fill="#00FF00" filter="url(#glow)">
