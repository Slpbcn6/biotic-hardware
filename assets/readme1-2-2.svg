    <text x="0" y="46" font-size="12" fill="#888888">p-value significance matrix</text>

    <text x="0" y="95" font-size="44" font-weight="bold" letter-spacing="-2" fill="#00FF00" filter="url(#glow)">9/10</text>
    <text x="0" y="115" font-size="13" fill="#FFFFFF" fill-opacity="0.9" font-weight="bold">pairs separated</text>

    <g transform="translate(0, 142)" opacity="0">
      <animate attributeName="opacity" to="1" dur="0.5s" begin="3.5s" fill="freeze"/>
      <text x="0" y="-6" font-size="10" fill="#888888">Pairwise Morphology Significance</text>
      
      <rect x="0"   y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="3.5s" fill="freeze"/>
      </rect>
      <rect x="20"  y="4" width="16" height="12" fill="#FF8888" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="3.6s" fill="freeze"/>
      </rect>
      <rect x="40"  y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="3.7s" fill="freeze"/>
      </rect>
      <rect x="60"  y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="3.8s" fill="freeze"/>
      </rect>
      <rect x="80"  y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="3.9s" fill="freeze"/>
      </rect>
      <rect x="100" y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.0s" fill="freeze"/>
      </rect>
      <rect x="120" y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.1s" fill="freeze"/>
      </rect>
      <rect x="140" y="4" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.2s" fill="freeze"/>
      </rect>

      <rect x="0"   y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.3s" fill="freeze"/>
      </rect>
      <rect x="20"  y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.4s" fill="freeze"/>
      </rect>
      <rect x="40"  y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.5s" fill="freeze"/>
      </rect>
      <rect x="60"  y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.6s" fill="freeze"/>
      </rect>
      <rect x="80"  y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.7s" fill="freeze"/>
      </rect>
      <rect x="100" y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.8s" fill="freeze"/>
      </rect>
      <rect x="120" y="20" width="16" height="12" fill="#00FF00" fill-opacity="0">
        <animate attributeName="fill-opacity" to="0.8" dur="0.1s" begin="4.9s" fill="freeze"/>
      </rect>
