  <text x="78" y="524" fill="#FFFFFF" fill-opacity="0.9" font-size="13">The fix reversed the central effect (botanical vs Voronoi, Merit_Scaled d = −1.05 → +0.61, non-significant).</text>
  <text x="78" y="546" fill="#FFFFFF" fill-opacity="0.9" font-size="13">The headline v1.3.0 finding did not survive.</text>
